<?xml version="1.0" encoding="UTF-8"?>
<!--
  Stimmgabel tuning-fork base shape.
  Original artwork created for this project (public domain / CC0).

  Schematic tuning fork: two parallel prongs reaching up, joined by a
  rounded yoke at the bottom of the U, with a rectangular handle hanging
  below. Symmetric on the vertical axis x=50. ViewBox 100×100.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    Single combined path for the whole fork silhouette so corners blend
    without seams. Drawn clockwise starting at the top-left of the left
    prong.
  -->
  <path fill="currentColor" d="
    M 28 10
    A 2 2 0 0 1 30 8
    L 38 8
    A 2 2 0 0 1 40 10
    L 40 56
    L 60 56
    L 60 10
    A 2 2 0 0 1 62 8
    L 70 8
    A 2 2 0 0 1 72 10
    L 72 64
    Q 72 78 58 78
    L 58 92
    A 2 2 0 0 1 56 94
    L 44 94
    A 2 2 0 0 1 42 92
    L 42 78
    Q 28 78 28 64
    Z
  "/>
</svg>
