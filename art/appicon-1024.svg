<?xml version="1.0" encoding="UTF-8"?>
<!--
  Stimmgabel App Icon — 1024×1024.
  macOS 11+ applies the squircle mask automatically; we provide a full
  square. Colourful designed look:
    - radial background gradient (deep blue → indigo)
    - subtle concentric "sound" rings emanating outward
    - centered tuning fork in white-to-silver gradient with a soft drop shadow
  Original artwork (public domain / CC0).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background: deep blue → indigo radial -->
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#4A6BF5"/>
      <stop offset="55%" stop-color="#3146C2"/>
      <stop offset="100%" stop-color="#1A1E60"/>
    </radialGradient>

    <!-- Fork: metallic silver gradient -->
    <linearGradient id="fork" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFF"/>
      <stop offset="40%" stop-color="#E2E8F4"/>
      <stop offset="100%" stop-color="#A8B0C8"/>
    </linearGradient>

    <!-- Drop shadow for the fork -->
    <filter id="forkShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="14" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle highlight gradient overlay on prongs (specular) -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full-square background. macOS applies the squircle mask. -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Concentric resonance rings (very subtle) -->
  <g fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="6">
    <circle cx="512" cy="460" r="300"/>
    <circle cx="512" cy="460" r="380"/>
    <circle cx="512" cy="460" r="460"/>
  </g>

  <!--
    Tuning fork. The 100x100 base path is translated and scaled to fit
    within a centered 600x600 box.
      target box: x=212..812, y=112..712 ⇒ translate(212, 112) scale(6).
  -->
  <g transform="translate(212 112) scale(6)" filter="url(#forkShadow)">
    <path fill="url(#fork)" d="
      M 28 10
      A 2 2 0 0 1 30 8
      L 38 8
      A 2 2 0 0 1 40 10
      L 40 56
      L 60 56
      L 60 10
      A 2 2 0 0 1 62 8
      L 70 8
      A 2 2 0 0 1 72 10
      L 72 64
      Q 72 78 58 78
      L 58 92
      A 2 2 0 0 1 56 94
      L 44 94
      A 2 2 0 0 1 42 92
      L 42 78
      Q 28 78 28 64
      Z
    "/>
    <!-- Specular highlight on prongs only (clipped to fork shape) -->
    <path fill="url(#highlight)" opacity="0.6" d="
      M 30 12
      L 38 12
      L 38 54
      L 30 54
      Z
      M 62 12
      L 70 12
      L 70 54
      L 62 54
      Z
    "/>
  </g>

  <!--
    Sound-wave arcs in the background, behind the fork, evoking 'struck → emitting'.
    Same composition idea as the active menubar icon but scaled up and rendered
    in a soft luminous color so the app icon stays colourful while the fork
    stays the focal element.
  -->
  <g fill="none" stroke="#FFFFFF" stroke-opacity="0.55" stroke-linecap="round" stroke-width="22">
    <!-- Left side, inner arc -->
    <path d="M 195 320 A 60 130 0 0 0 195 580"/>
    <!-- Left side, outer arc -->
    <path d="M 95  240 A 130 210 0 0 0 95  660"/>
    <!-- Right side, inner arc -->
    <path d="M 829 320 A 60 130 0 0 1 829 580"/>
    <!-- Right side, outer arc -->
    <path d="M 929 240 A 130 210 0 0 1 929 660"/>
  </g>
</svg>
