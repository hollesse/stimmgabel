<?xml version="1.0"?>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    
    <radialGradient id="bg" cx="50%" cy="40%" r="78%">
      <stop offset="0%" stop-color="#3361c9"></stop>
      <stop offset="42%" stop-color="#1c4196"></stop>
      <stop offset="100%" stop-color="#091a47"></stop>
    </radialGradient>

    
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fdfefe"></stop>
      <stop offset="16%" stop-color="#dde5ef"></stop>
      <stop offset="45%" stop-color="#aeb9c9"></stop>
      <stop offset="72%" stop-color="#8b97a9"></stop>
      <stop offset="100%" stop-color="#c4cdda"></stop>
    </linearGradient>

    
    <linearGradient id="ring-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bdf6ff"></stop>
      <stop offset="100%" stop-color="#46c8ff"></stop>
    </linearGradient>

    
    <filter id="fork-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#04102e" flood-opacity="0.55"></feDropShadow>
    </filter>

    
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="b"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  
  <rect id="background" x="0" y="0" width="1024" height="1024" fill="url(#bg)"></rect>

  
  <g id="motif" transform="translate(512 512) scale(0.9) translate(-512 -512)">

    
    <g id="waves" fill="none" stroke="url(#ring-glow)" stroke-width="36" stroke-linecap="round" filter="url(#glow)">
      
      <g id="waves-left">
        <path d="M 328 435.8 A 88 88 0 0 0 328 588.2"></path>
        <path d="M 293 375.2 A 158 158 0 0 0 293 648.8"></path>
      </g>
      <g id="waves-right">
        <path d="M 696 435.8 A 88 88 0 0 1 696 588.2"></path>
        <path d="M 731 375.2 A 158 158 0 0 1 731 648.8"></path>
      </g>
    </g>

    
    <g id="tuning-fork" filter="url(#fork-shadow)">
      <g fill="none" stroke="url(#chrome)" stroke-width="80" stroke-linecap="round" stroke-linejoin="round">
        <path id="prongs" d="M 428 130 L 428 600 A 84 84 0 0 0 596 600 L 596 130"></path>
        <path id="stem" d="M 512 684 L 512 826"></path>
      </g>
      <circle id="foot" cx="512" cy="846" r="54" fill="url(#chrome)"></circle>
      
      <g fill="none" stroke="#ffffff" stroke-opacity="0.7" stroke-width="12" stroke-linecap="round">
        <path d="M 410 165 L 410 595"></path>
        <path d="M 494 700 L 494 818"></path>
      </g>
    </g>

  </g>
</svg>